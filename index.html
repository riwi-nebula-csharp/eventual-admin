<script>
        // Simple micro-interaction for form submission
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Autenticando...</span>
            `;

            // Mock success redirection
            setTimeout(() => {
                btn.classList.add('bg-green-500');
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Acceso Concedido</span>
                `;
                console.log("Admin Logged In Successfully");
            }, 1500);
        });

        // Floating particle effect for Admin atmospheric depth
        const createParticle = () => {
            const particle = document.createElement('div');
            particle.className = 'fixed bg-primary/20 rounded-full pointer-events-none z-0';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.opacity = '0';
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0 },
                { opacity: 0.5, offset: 0.5 },
                { transform: `translateY(-${Math.random() * 100 + 50}px) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 2000,
                easing: 'ease-out'
            });

            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 500);
    </script>
